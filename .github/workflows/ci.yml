name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    runs-on: windows-latest
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_NOLOGO: true
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check Rust formatting
        run: cargo fmt --all --check

      - name: Test Rust core
        run: .\scripts\build-rust.ps1 -Test

      - name: Restore WinUI app
        run: dotnet restore Seiza.slnx -r win-x64 -p:Configuration=Release

      - name: Build WinUI app (Release)
        run: dotnet build Seiza.slnx -c Release --no-restore

      - name: Build all-users MSI
        run: dotnet build packaging\windows\Seiza.App.wixproj -c Release -p:SeizaVersion=1.0.0

      - name: Upload Windows installer
        uses: actions/upload-artifact@v7
        with:
          name: seiza-windows-installer
          path: dist/*.msi
          if-no-files-found: error

      - name: Smoke-test Windows installer
        run: .\.github\scripts\test-windows-installer.ps1 -Msi .\dist\seiza-1.0.0-windows-x86_64.msi
